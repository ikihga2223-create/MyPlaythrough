# docker-compose.yml — MyPlaythrough
#
# Levanta dos servicios con un solo comando: docker compose up --build
#   - db:     PostgreSQL 16 con datos persistentes en un volumen Docker.
#   - server: el servidor Express conectado a la base de datos.
#
# El frontend (React/Vite) sigue corriéndose localmente con "npm run dev"
# porque en desarrollo es más cómodo tener el hot-reload nativo de Vite.
#
# Para la evaluación, el evaluador solo necesita:
#   1. docker compose up --build
#   2. npm run dev en /client
#
# Las tablas se crean automáticamente la primera vez gracias al montaje
# de docs/schema.sql en /docker-entrypoint-initdb.d/ del contenedor de Postgres.

services:

  # ------------------------------------------------------------------
  # Base de datos PostgreSQL
  # ------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    # alpine es la variante más ligera de la imagen oficial de Postgres.
    container_name: myplaythrough_db
    restart: unless-stopped
    environment:
      # Estas variables las lee la imagen oficial de Postgres al iniciarse
      # para crear la BD y el usuario por primera vez.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: myplaythrough
    ports:
      # Mapeamos el puerto para poder conectarnos desde pgAdmin en el host.
      - "5432:5432"
    volumes:
      # Los datos de la BD se guardan en un volumen con nombre (no en el contenedor),
      # así persisten aunque hagamos "docker compose down".
      - postgres_data:/var/lib/postgresql/data
      # La imagen oficial de Postgres ejecuta automáticamente todos los .sql
      # que encuentre en /docker-entrypoint-initdb.d/ la PRIMERA vez que
      # se inicializa el volumen (cuando está vacío). Así no hace falta
      # abrir pgAdmin ni ejecutar nada a mano.
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      # El servidor espera a que Postgres esté listo antes de arrancar.
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Servidor Express
  # ------------------------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: myplaythrough_server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Sobreescribimos las variables de entorno del servidor para que
      # apunten al servicio "db" (nombre del servicio = hostname en Docker).
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin1234
      DB_NAME: myplaythrough
      PORT: 3000
      JWT_SECRET: myplaythrough_docker_secret_2026
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: production
      RAWG_API_KEY: 8ea97647a110478f953dcb6e58be0523
    depends_on:
      db:
        condition: service_healthy
        # "service_healthy" espera al healthcheck de postgres antes de arrancar Express.
        # Sin esto, el servidor intentaría conectarse a la BD antes de que estuviera lista.

volumes:
  # Volumen con nombre gestionado por Docker. Los datos sobreviven a "docker compose down".
  # Para borrar los datos completamente: docker compose down -v
  postgres_data:
